version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: eisenhower-postgres
    environment:
      POSTGRES_USER: eisenhower
      POSTGRES_PASSWORD: eisenhower_pass
      POSTGRES_DB: eisenhower_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eisenhower-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eisenhower"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eisenhower-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://eisenhower:eisenhower_pass@postgres:5432/eisenhower_db
      JWT_SECRET: your_jwt_secret_key_here_change_in_production
      API_PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eisenhower-network
    command: npm run dev

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: eisenhower-frontend
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - eisenhower-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  eisenhower-network:
    driver: bridge
